<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucy</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #141427, #0b0b12 60%);
  color: white;
}

.hero {
  display: flex;
  justify-content: center;
  padding-top: 80px;
}

.hero-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.badge {
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: #bbb;
  margin-bottom: 18px;
}

.avatar {
  width: 120px;
  border-radius: 22px;
  margin-bottom: 18px;
}

h1 {
  font-size: 76px;
  margin: 0;
  background: linear-gradient(90deg,#7c5cff,#00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  max-width: 680px;
  font-size: 18px;
  color: #b5b5b5;
  line-height: 1.6;
  margin-top: 14px;
}

.btns {
  display: flex;
  gap: 12px;
  margin-top: 18px;
}

.btn {
  padding: 14px 22px;
  border-radius: 14px;
  background: linear-gradient(135deg,#7c5cff,#00d4ff);
  color: black;
  font-weight: 700;
  text-decoration: none;
}

.secondary {
  padding: 14px 22px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  color: white;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.12);
}

.section {
  max-width: 900px;
  margin: 80px auto;
  padding: 0 24px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 18px;
  border-radius: 16px;
  line-height: 1.6;
}
</style>

</head>

<body>

<div class="hero">
  <div class="hero-inner">

    <div class="badge">LOCAL AI DESKTOP AGENT</div>

    <img class="avatar" src="assets/lucy.png">

    <h1>Lucy</h1>

    <p class="subtitle">
      A local AI agent that reads webpages, writes content, and automates your browser through a Chrome Bridge.
    </p>

    <div class="btns">
      <a class="btn" href="https://github.com/momantic/Lucy/releases/latest/download/Lucy-v0.1-beta.zip">
        Download Lucy
      </a>

      <a class="secondary" href="/Lucy/bridge/">
        Install Chrome Bridge
      </a>
    </div>

  </div>
</div>

<div class="section">
  <div class="card">
    🧠 Understands webpages in real time<br>
    🌐 Extracts browser content<br>
    ✍️ Writes posts, emails, summaries<br>
    ⚙️ Runs local AI workflows
  </div>
</div>

</body>
</html>

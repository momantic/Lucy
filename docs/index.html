<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lucy</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0b12;
  color:white;
}
.container{
  max-width:900px;
  margin:0 auto;
  padding:80px 20px;
  text-align:center;
}
h1{
  font-size:64px;
  background:linear-gradient(90deg,#7c5cff,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:18px;
  border-radius:14px;
  margin-top:20px;
}
.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 20px;
  background:linear-gradient(135deg,#7c5cff,#00d4ff);
  color:black;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
}
.secondary{
  display:inline-block;
  margin-top:10px;
  padding:10px 18px;
  background:rgba(255,255,255,0.08);
  color:white;
  border-radius:10px;
  text-decoration:none;
}
img{
  width:120px;
  height:120px;
  border-radius:20px;
  object-fit:cover;
  margin-bottom:20px;
}
</style>
</head>

<body>
<div class="container">

<img src="assets/lucy.png" />

<h1>Lucy</h1>

<p>Local AI agent for browsing, writing, and research.</p>

<a class="btn"
href="https://github.com/momantic/Lucy/releases/latest/download/Lucy-v0.1-beta.zip">
Download Lucy
</a>

<br>

<a class="secondary"
href="chrome://extensions">
Install Chrome Bridge
</a>

<div class="card">
Try Lucy:
<br><br>
write me a linkedin post about ai agents in stock markets
</div>

</div>
</body>
</html>

<div class="card">

<h1>Install Chrome Bridge</h1>

<ol>
<li>Open Chrome</li>
<li>Go to <b>chrome://extensions</b></li>
<li>Enable Developer Mode</li>
<li>Click “Load unpacked”</li>
<li>Select the Lucy Bridge folder</li>
</ol>

<p><b>Done.</b> Lucy can now browse the web.</p>

</div>

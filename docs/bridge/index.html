<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucy Chrome Bridge</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b0b12;
  color: white;
  text-align: center;
  padding: 80px 20px;
}

.card {
  max-width: 700px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 30px;
}

h1 {
  font-size: 42px;
}

.badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  font-size: 12px;
  margin-bottom: 10px;
}

.steps {
  text-align: left;
  margin-top: 20px;
  line-height: 1.8;
}

.pending {
  color: #00d4ff;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

<div class="badge">CHROME BRIDGE</div>

<h1>Install Lucy Bridge</h1>

<p class="pending">Status: Pending Chrome Web Store Approval</p>

<div class="steps">
1. Once approved, click “Install on Chrome Web Store”<br>
2. Click “Add to Chrome”<br>
3. Open Chrome → Click extension icon<br>
4. Connect to Lucy desktop app<br><br>

<b>Right now:</b> This extension is under review by Google.
</div>

</div>
